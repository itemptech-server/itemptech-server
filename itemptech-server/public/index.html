<html lang="en">
<head>

<title>Itemptech — Console</title>
<style>
  :root{--bg:#0f1420;--card:#171e2e;--line:#26304a;--txt:#e6ebf5;--dim:#8a96b0;--accent:#3b82f6}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--txt);padding:40px 20px}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--dim);font-size:13px;margin:0 0 28px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  a.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:12px;
         padding:20px;text-decoration:none;color:var(--txt)}
  a.card:hover{border-color:var(--accent)}
  .card b{font-size:15px}
  .card span{display:block;color:var(--dim);font-size:12px;margin-top:4px}
  .foot{margin-top:32px;font-size:11px;color:var(--dim)}
</style>
</head>
