<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Itemptech — Sign in</title>
<style>
  :root{--bg:#0f1420;--card:#171e2e;--line:#26304a;--txt:#e6ebf5;--dim:#8a96b0;--accent:#3b82f6}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  .card{width:min(380px,92vw);background:var(--card);border:1px solid var(--line);
        border-radius:16px;padding:34px 30px;text-align:center}
  h1{font-size:20px;margin:0 0 6px}
  p{color:var(--dim);font-size:13px;margin:0 0 26px}
  .btn{display:block;width:100%;padding:13px;border:0;border-radius:10px;background:var(--accent);
       color:#fff;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none}
  .foot{margin-top:22px;font-size:11px;color:var(--dim)}
</style>
</head>
<body>
  <div class="card">
    <h1>Itemptech Console</h1>
    <p>Sign in with your company DingTalk account</p>
    <a class="btn" href="/auth/dingtalk/login">Sign in with DingTalk</a>
    <div class="foot">Made By Jitemore.</div>
  </div>
</body>
</html>
